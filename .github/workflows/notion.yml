name: Notion Sync

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed files
        run: |
          # core.quotePath=false : 한글 등 비ASCII 파일명이 따옴표/이스케이프 없이 그대로 출력되게 함
          echo "=== Changed Files ==="
          git -c core.quotePath=false diff --name-only HEAD~1 HEAD || true

          echo "=== Detected programmers files ==="
          git -c core.quotePath=false diff --name-only HEAD~1 HEAD | grep '^programmers/' || true

          # 변경된 programmers 파일을 모두(줄바꿈 구분) 환경변수로 전달
          {
            echo "FILE_PATHS<<EOF"
            git -c core.quotePath=false diff --name-only HEAD~1 HEAD | grep '^programmers/' || true
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests

      - name: Run Notion Sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          FILE_PATHS: ${{ env.FILE_PATHS }}
        run: python scripts/notion_sync.py